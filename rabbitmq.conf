# RabbitMQ Configuration File
# Reference: https://www.rabbitmq.com/configure.html

# Network and Protocol Settings
listeners.tcp.default = 5672
management.listeners.tcp.default = 15672

# Memory
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk Space
disk_free_limit.absolute = 50MB

# Message TTL (time-to-live): Messages expire after 1 hour if not consumed
# Uncomment to enable:
# default_vhost_metadata.max_message_ttl = 3600000

# Heartbeat (connection keep-alive)
heartbeat = 60

# Management plugin
management.load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.file.level = info
log.console = true
log.console.level = info
